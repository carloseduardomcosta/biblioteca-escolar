{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-4">Login - Biblioteca do Teófilo</h2>

    <!-- Formulário de Login -->
    <form method="post" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input
          type="text"
          name="username"
          id="username"
          class="form-control"
          required
          autofocus
        >
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Senha</label>
        <input
          type="password"
          name="password"
          id="password"
          class="form-control"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
    <!-- Cadastro de usuários é feito somente pela área administrativa (após login). -->
  </div>
</div>
{% endblock %}
