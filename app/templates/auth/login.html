{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-4">Login - Biblioteca do Teófilo</h2>

    <!-- Formulário de Login -->
    <form method="post" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label for="username" class="form-label">Usuário</label>
        <input
          type="text"
          name="username"
          id="username"
          class="form-control"
          required
          autofocus
        >
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Senha</label>
        <input
          type="password"
          name="password"
          id="password"
          class="form-control"
          required
        >
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    <!-- Link para abrir o Modal de Cadastro -->
    <div class="mt-3 text-center">
      <a href="#" data-bs-toggle="modal" data-bs-target="#registerModal">
        Cadastrar novo usuário
      </a>
    </div>
  </div>
</div>

<!-- Modal de Registro de Novo Usuário (Fora do <form> de login) -->
<div
  class="modal fade"
  id="registerModal"
  tabindex="-1"
  aria-labelledby="registerModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="registerModalLabel">
          Registrar novo usuário
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Fechar"
        ></button>
      </div>
      <div class="modal-body">
        <form id="registerForm">
          <div class="mb-3">
            <label for="newUsername" class="form-label">Novo usuário</label>
            <input
              type="text"
              id="newUsername"
              class="form-control"
              required
            >
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">Senha</label>
            <input
              type="password"
              id="newPassword"
              class="form-control"
              required
            >
          </div>
          <hr>
          <div class="mb-3">
            <label for="adminUsername" class="form-label">Admin usuário</label>
            <input
              type="text"
              id="adminUsername"
              class="form-control"
              required
            >
          </div>
          <div class="mb-3">
            <label for="adminPassword" class="form-label">Admin senha</label>
            <input
              type="password"
              id="adminPassword"
              class="form-control"
              required
            >
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >Cancelar</button>
        <button
          type="button"
          id="btnRegisterUser"
          class="btn btn-primary"
        >Registrar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(function(){
  // Instancia o Modal via API Bootstrap 5
  const modalEl = document.getElementById('registerModal');
  const registerModal = bootstrap.Modal.getOrCreateInstance(modalEl);

  // Handler do botão de Registrar no modal
  $('#btnRegisterUser').click(async () => {
    const newU = $('#newUsername').val().trim();
    const newP = $('#newPassword').val();
    const admU = $('#adminUsername').val().trim();
    const admP = $('#adminPassword').val();

    if (!newU || !newP || !admU || !admP) {
      toastr.error('Preencha todos os campos');
      return;
    }

    const payload = {
      new_username: newU,
      new_password: newP,
      admin_username: admU,
      admin_password: admP
    };

    try {
      const res = await fetch("{{ url_for('auth.register') }}", {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (res.status === 201) {
        toastr.success(data.message);
        registerModal.hide();               // fecha o modal
        $('#registerForm')[0].reset();      // limpa o form interno
      } else {
        toastr.error(data.error || 'Erro ao cadastrar');
      }
    } catch (err) {
      toastr.error('Falha na comunicação');
    }
  });
});
</script>
{% endblock %}
