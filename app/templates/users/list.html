{% extends 'base.html' %}
{% block title %}Gestão de Usuários{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Usuários</h1>
  <a href="{{ url_for('users.criar_usuario') }}" class="btn btn-success">
    <i class="fa-solid fa-user-plus"></i> Novo Usuário
  </a>
</div>

<table id="usersTable" class="table table-striped datatable" style="width:100%">
  <thead>
    <tr>
      <th>ID</th><th>Username</th><th>Ações</th>
    </tr>
  </thead>
  <tbody>
  {% for u in usuarios %}
    <tr>
      <td>{{ u.id }}</td>
      <td>{{ u.username }}</td>
      <td>
        <a href="{{ url_for('users.editar_usuario', uid=u.id) }}"
           class="btn btn-sm btn-primary">
          <i class="fa-solid fa-edit"></i>
        </a>
        <form method="post" action="{{ url_for('users.excluir_usuario', uid=u.id) }}"
              style="display:inline" onsubmit="return confirm('Excluir usuário?');">
          <button class="btn btn-sm btn-danger">
            <i class="fa-solid fa-trash"></i>
          </button>
        </form>
      </td>
    </tr>
  {% endfor %}
  </tbody>
</table>
{% endblock %}
