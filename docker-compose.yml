version: "3.8"
services:

  db:
    image: mysql:8.0
    container_name: biblioteca-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:     ${MYSQL_DATABASE}
      MYSQL_USER:         ${MYSQL_USER}
      MYSQL_PASSWORD:     ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"

  web:
    build: ./app
    container_name: biblioteca-app
    restart: unless-stopped
    env_file: .env
    environment:
      # usa as mesmas variáveis definidas em .env
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
    depends_on:
      - db
    ports:
      - "65000:65000"
    volumes:
      - ./app:/app:ro
    command: >
      gunicorn
      --capture-output
      --error-logfile -
      --log-level debug
      --bind 0.0.0.0:65000
      app:app

  grafana:
    image: grafana/grafana:latest
    container_name: biblioteca-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "grafana123"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: biblioteca-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      # Se quiser pré‐definir credenciais de login (opcional):
      # PMA_USER: ${MYSQL_USER}
      # PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  mysql_data:
  grafana_data:
