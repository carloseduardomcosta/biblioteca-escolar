services:

  db:
    image: mysql:8.0
    container_name: biblioteca-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:     ${MYSQL_DATABASE}
      MYSQL_USER:         ${MYSQL_USER}
      MYSQL_PASSWORD:     ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    # Sem "ports:" de propósito — o banco NÃO é exposto para fora.
    # Só a aplicação (mesma rede Docker) o acessa pelo host "db".

  web:
    build: ./app
    container_name: biblioteca-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
    depends_on:
      - db
    ports:
      # Só localhost do servidor (testes/admin). O ingresso público é via
      # Cloudflare -> nginx (proxy_net), que alcança "biblioteca-app:65000".
      - "127.0.0.1:65000:65000"
    networks:
      - default
      - proxy_net
    volumes:
      - ./app:/app:ro
      # Código read-only, mas os barcodes gerados precisam de escrita:
      - ./app/static/barcodes:/app/static/barcodes
    command: >
      gunicorn
      --capture-output
      --error-logfile -
      --log-level info
      --workers 3
      --bind 0.0.0.0:65000
      app:app

volumes:
  mysql_data:

networks:
  # rede compartilhada do proxy nginx (/opt/infra/proxy)
  proxy_net:
    external: true
    name: proxy_net
  default: {}
